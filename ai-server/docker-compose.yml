version: '3.8'

services:
  # 1. AI Server (FastAPI)
  ai-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Use internal Railway networking to connect to Weaviate
      - WEAVIATE_URL=http://weaviate:8080
      - APP_NAME=RAG Backend
      - LOG_LEVEL=INFO
      - LLM_PROVIDER=google
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - RERANKER_MODEL=cross-encoder/ms-marco-MiniLM-L-6-v2
      - RERANKER_TOP_K=5
      - RETRIEVAL_TOP_K=20
      - HYBRID_SEARCH_ALPHA=0.5
      - MAX_AGENT_ITERATIONS=10
      - LANGCHAIN_TRACING_V2=false
      # Các biến này sẽ lấy từ Railway Environment Variables:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MONGODB_URL=${MONGODB_URL}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME}
    depends_on:
      - weaviate

  # 2. Weaviate Vector Database
  weaviate:
    image: semitechnologies/weaviate:1.24.10
    ports:
      - "8080:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_MODULES=
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  # Railway sẽ tự động tạo persistent volume cho dữ liệu này
  weaviate_data:
