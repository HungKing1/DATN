# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# File upload limits (for document ingestion)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ===============================
# MONGODB CONFIGURATION
# ===============================
# spring.mongodb.uri=${MONGODB_URI}
spring.mongodb.uri=${MONGODB_URI}

# ===============================
# SECURITY & AUTHENTICATION
# ===============================
auth.cookie.name=SESSION_ID
auth.cookie.max-age=604800
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.http-only=true

# ===============================
# JSON CONFIG
# ===============================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.serialization.fail-on-empty-beans=false

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

# ===============================
# AI SERVER (RAG Backend)
# ===============================
ai-server.base-url=${AI_SERVER_URL:http://localhost:8000}
# Quick RAG query timeout (ms) — standard RAG pipeline
ai-server.timeout=60000
# Agent query timeout (ms) — Multi-Agent LangGraph (chậm hơn vì parallel agents)
ai-server.agent-timeout=300000